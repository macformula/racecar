syntax = "proto3";
package lvcontroller;
option go_package = "./gotobuf";

message PWM {
    float frequency_hz = 1;
    float duty_cycle = 2;
}

message Output {
    // Tractive system status indicator
    bool tssi_en = 1;
    bool tssi_red_signal = 2;
    bool tssi_green_signal = 3;

    // Powertrain cooling
    bool powertrain_pump1_en = 4;
    bool powertrain_pump2_en = 5;
    bool powertrain_fan1_en = 6;
    bool powertrain_fan2_en = 7;

    PWM powertrain_fan_pwm = 8;

    // Motor Controller
    bool motor_controller_en = 9;
    bool motor_ctrl_precharge_en = 10;
    bool motor_ctrl_switch_en = 11;

    // Subsystems
    bool accumulator_en = 12;
    bool front_controller_en = 13;
    bool imu_gps_en = 14;
    bool shutdown_circuit_en = 15;

    // DCDC System & measurement
    bool dcdc_en = 16;
    bool dcdc_sense_select = 17;
    bool vicor_en = 32;

    // HSD sensing
    bool hsd1_isense_en = 19;
    bool hsd1_sel0 = 20;
    bool hsd1_sel1 = 21;
    bool hsd2_isense_en = 22;
    bool hsd2_sel = 23;
    bool hsd3_isense_en = 24;
    bool hsd3_sel = 25;
    bool hsd4_isense_en = 26;
    bool hsd4_sel = 27;
    bool hsd5_isense_en = 28;
    bool hsd5_sel = 29;
    bool hsd6_isense_en = 30;
    bool hsd6_sel = 31;

    // Other
    bool brake_light_en = 18;
}

message Input {
    // Tractive system status indicator
    bool imd_fault = 1;
    bool bms_fault = 2;

    // DCDC System & Measurement
    float dcdc_sense = 3;
    float suspension_travel3 = 4;
    float suspension_travel4 = 5;
    float lv_battery = 12;
    float bus_voltage = 13;
    float bus_current = 14;

    // HSD sensing
    float hsd1_isense = 6;
    float hsd2_isense = 7;
    float hsd3_isense = 8;
    float hsd4_isense = 9;
    float hsd5_isense = 10;
    float hsd6_isense = 11;
}
