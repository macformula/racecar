name: Test Self-Hosted Runner

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

jobs:
  setup:
    runs-on: self-hosted
    outputs:
      matrix_all_projects: ${{ steps.projects.outputs.matrix_all_projects }}
      matrix_modified_projects: ${{ steps.projects.outputs.matrix_modified_projects }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        run: |
          python3 -m venv .venv

      - name: Get projects
        id: projects
        run: |
          source .venv/bin/activate
          BASE_REF=${{ github.base_ref }} # Target branch of the PR
          BASE_REF=${BASE_REF:-HEAD^} # Previous commit on push to main
          python3 scripts/actions/all_projects.py
          python3 scripts/actions/modified_projects.py origin/$BASE_REF
          echo "all_projects_matrix=$(cat all_projects_matrix.json)" >> $GITHUB_OUTPUT
          echo "modified_projects_matrix=$(cat modified_projects_matrix.json)" >> $GITHUB_OUTPUT

  build-all-projects:
    needs: setup
    strategy:
      matrix: 
        include: ${{ fromJson(needs.setup.outputs.matrix_all_projects) }}
    uses: ./.github/workflows/reusable-build-project.yml
    with:
      project: ${{ matrix.project }}
      platform: ${{ matrix.platform }}

  build-modified-projects:
    needs: setup
    strategy:
      fail-fast: false
      matrix: 
        include: ${{ fromJson(needs.setup.outputs.matrix_modified_projects) }}
    uses: ./.github/workflows/reusable-build-project.yml
    with:
      project: ${{ matrix.project }}
      platform: ${{ matrix.platform }}
